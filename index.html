<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <title>段予婷</title>
    <script>
      // Apply the dark/light theme synchronously before React boots so there
      // is no flash of the wrong colours.
      //   theme = "dark" | "light"  (set by the theme toggle)
      // Falls back to the OS preference when no explicit choice is stored.
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var isDark =
            stored === "dark" ||
            (stored !== "light" &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (isDark) document.documentElement.classList.add("dark");
        } catch (e) {
          /* private browsing / quota — ignore */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
