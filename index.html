<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#faf8f3" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#14170f" media="(prefers-color-scheme: dark)" />
    <title>段 / Duan</title>
    <script>
      // GitHub Pages SPA fallback decoder (pairs with public/404.html). If we
      // arrived via the 404 redirect (path encoded as "/?/…"), rewrite the URL
      // back to the real path before the router boots — no "#" in the address.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <script>
      // Apply the dark/light theme synchronously before React boots so there
      // is no flash of the wrong colours.
      //   duan:theme = "dark" | "light"  (set by the theme toggle)
      // Key is namespaced because GitHub Pages project sites share one origin
      // (pierre-claisse.github.io) and localStorage is per-origin — a bare
      // "theme" key would collide with the other apps hosted there.
      // Falls back to the OS preference when no explicit choice is stored.
      (function () {
        try {
          var stored = localStorage.getItem("duan:theme");
          var isDark =
            stored === "dark" ||
            (stored !== "light" &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (isDark) document.documentElement.classList.add("dark");
        } catch (e) {
          /* private browsing / quota — ignore */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
