<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <title>段 / Duan</title>
    <!--
      GitHub Pages SPA fallback (spa-github-pages technique by Rafael Pedicini).
      Pages serves this 404 for any unknown path; we re-encode the path into a
      query string and bounce to the app root, where index.html decodes it back.
      pathSegmentsToKeep = 0 because the site is served at the root of the custom
      domain (https://duan.life), not under a project subpath.
    -->
    <script>
      (function () {
        var pathSegmentsToKeep = 0;
        var l = window.location;
        l.replace(
          l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
            l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") +
            "/?/" +
            l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
            (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
