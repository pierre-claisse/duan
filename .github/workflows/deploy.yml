# Build and deploy the SPA to GitHub Pages on every push to `main`.
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Encrypt secrets into public/secrets.json
        env:
          SYNC_PAT: ${{ secrets.SYNC_PAT }}
          SYNC_PASSWORD: ${{ secrets.SYNC_PASSWORD }}
        run: node scripts/build-secrets.mjs

      - name: Vite build
        # The site is served at the root of the custom domain https://duan.life,
        # so the base stays "/" (vite.config defaults to "/" when VITE_BASE is
        # unset). Restore VITE_BASE only if hosting moves back to a subpath.
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
